name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0点 (北京时间 8点) 运行一次
  workflow_dispatch: # 允许手动触发

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    # 仅在 fork 后的仓库中运行，不在原仓库运行
    if: github.repository != 'Dreamy-rain/gemini-business2api'

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream changes
        shell: bash
        run: |
          set -euo pipefail

          # 1. 获取上游仓库地址
          UPSTREAM_URL="$(gh repo view "${{ github.repository }}" --json parent -q '"https://github.com/" + .parent.owner.login + "/" + .parent.name')"
          echo "Upstream URL: $UPSTREAM_URL"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_URL"
          else
            git remote add upstream "$UPSTREAM_URL"
          fi

          git fetch upstream main

          # 2. 尝试合并。
          # 非 workflow 文件出现文本冲突时，默认采用上游版本，避免 fork 因文档或说明改动阻塞同步。
          if git merge upstream/main --no-commit --no-ff -X theirs; then
            echo "Merge completed without unresolved conflicts."
          else
            if ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
              echo "git merge failed before entering merge state."
              exit 1
            fi
            echo "Merge conflicts detected. Resolving remaining conflicts."
          fi

          # 3. 强制保留当前仓库的受保护文件
          for protected in .github/workflows .gitignore .gitattributes; do
            if [ -e "$protected" ] || git ls-files --error-unmatch "$protected" >/dev/null 2>&1; then
              git checkout HEAD -- "$protected" 2>/dev/null || true
              git add -- "$protected" 2>/dev/null || true
            fi
          done

          # 4. 若仍有未解决冲突，非 workflow 文件一律采用上游版本
          mapfile -t unmerged_paths < <(git diff --name-only --diff-filter=U)
          if [ "${#unmerged_paths[@]}" -gt 0 ]; then
            for path in "${unmerged_paths[@]}"; do
              if [[ "$path" == .github/workflows/* || "$path" == .gitignore || "$path" == .gitattributes ]]; then
                git checkout HEAD -- "$path"
              else
                git checkout --theirs -- "$path"
              fi
              git add -- "$path"
            done
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved merge conflicts remain:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

          # 5. 完成同步
          if git diff-index --quiet HEAD; then
            echo "No changes to sync."
          else
            git commit -m "chore: sync upstream and protect workflows"
            git push origin HEAD:main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
